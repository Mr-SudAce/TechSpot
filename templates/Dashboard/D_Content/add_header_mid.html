{% extends "Dashboard/dashboard.html" %}

{% block add_header_mid %}
<style>
    input,
    select {
        width: 80%;
        padding: 6px;
        border: 1px solid #ccc;
        border-radius: 10px;
    }
</style>
<h1 class="text-center mt-4 mb-3">Header Management</h1>

<div class="container">
    <table class="table bg-white">
        <tr>
            <th class="align-middle">Image Left</th>
            <td>{{ A_header_mid.header_image_left }}</td>
        </tr>
        <!-- <tr>
            <th class="bg-primary text-white"><label for="cart_status">Image Right</label></th>
            <td>{{ A_header_mid.header_image_right }}</td>
        </tr> -->
    </table>

    <div class="text-center">
        <button type="submit" name="submit_A_header_mid_save" class="btn btn-success px-4 py-2">
            <i class="fas fa-save"></i> Save
        </button>
    </div>

    <div class="mt-5">
        <table class="table table-hover text-center shadow-sm bg-white">
            <thead class="table-dark text-white">
                <tr>
                    <th>Image</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% if header %}
                <tr>
                    <td>
                        <img src="{{ header.header_image_left.url }}" alt="Header Image" class="img-thumbnail"
                            style="width: 120px;">
                    </td>
                    <td>
                        <a href="{% url 'del_header' header.id %}" class="btn btn-danger btn-sm">
                            <i class="fas fa-trash-alt"></i> Delete
                        </a>
                    </td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="2" class="text-muted">No Header Logo Available</td>
                </tr>
                {% endif %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
