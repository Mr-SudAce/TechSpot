<style>
    .advertisement{
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
    }
    .advertisement-img {
        width: 100%;
        height: 200px;
        object-fit: fill;
    }

    .advertisement img:hover {
        transition: filter 0.5s ease-in-out;
        filter: brightness(0.6);
    }
</style>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-12 col-md-12 col-sm-6 gap-4 text-center">
            <div class="advertisement">
                {% for ad in advertisement %}
                <a href="{{ad.link}}"><img src="{{ad.image.url}}" alt="adv1" class="advertisement-img" loading="lazy" ></a>
                {% endfor %}
            </div>
        </div>
    </div>
</div>
